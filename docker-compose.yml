services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jourloc
      POSTGRES_PASSWORD: jourloc
      POSTGRES_DB: jourloc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jourloc -d jourloc"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - jourloc_data:/var/lib/postgresql/data

volumes:
  jourloc_data:
